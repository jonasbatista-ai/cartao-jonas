<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jonas Batista — Shiel ID</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff0066;
    --orange: #ff7f00;
    --dark: #212121;
    --darker: #020202;
    --light: #f9f9f9;
    --mid: #4c4c4c;
    --grad: linear-gradient(135deg, #ff0066 0%, #ff7f00 100%);
  }

  html, body {
    min-height: 100vh;
    background: var(--darker);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Sora', sans-serif;
    padding: 24px;
  }

  /* Subtle noise texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .card-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    animation: cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Glow behind card */
  .card-wrapper::before {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 22px;
    background: var(--grad);
    filter: blur(18px);
    opacity: 0.35;
    z-index: -1;
  }

  .card {
    background: #181818;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* Top bar gradient strip */
  .top-bar {
    height: 4px;
    background: var(--grad);
  }

  .card-inner {
    padding: 36px 36px 32px;
  }

  /* Logo */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
    animation: fadeUp 0.6s 0.15s cubic-bezier(0.22,1,0.36,1) both;
  }

  .logo-icon {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: var(--light);
    letter-spacing: -0.3px;
  }

  /* Name block */
  .name-block {
    margin-bottom: 6px;
    animation: fadeUp 0.6s 0.22s cubic-bezier(0.22,1,0.36,1) both;
  }

  .name {
    font-size: 30px;
    font-weight: 800;
    color: var(--light);
    line-height: 1.1;
    letter-spacing: -0.8px;
  }

  .role {
    margin-top: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.6s 0.28s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 28px 0;
    animation: fadeUp 0.6s 0.32s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* Contact items */
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeUp 0.6s 0.36s cubic-bezier(0.22,1,0.36,1) both;
  }

  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }

  .contact-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }

  .contact-item:hover .contact-icon {
    background: rgba(255,0,102,0.12);
    border-color: rgba(255,0,102,0.3);
  }

  .contact-icon svg {
    width: 16px;
    height: 16px;
  }

  .contact-info {
    display: flex;
    flex-direction: column;
  }

  .contact-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #5c5c5c;
    margin-bottom: 2px;
  }

  .contact-value {
    font-size: 14px;
    font-weight: 400;
    color: #d3d3d3;
  }

  /* Bottom strip */
  .bottom-strip {
    height: 3px;
    background: linear-gradient(90deg, #ff0066 0%, #ff7f00 60%, transparent 100%);
    opacity: 0.6;
  }

  /* CTA save button */
  .cta-row {
    padding: 20px 36px 28px;
    animation: fadeUp 0.6s 0.42s cubic-bezier(0.22,1,0.36,1) both;
  }

  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 13px;
    border-radius: 12px;
    background: var(--grad);
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.3px;
    border: none;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.15s;
  }

  .cta-btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .cta-btn:active { transform: translateY(0); opacity: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Tag line below card */
  .tagline {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: #3a3a3a;
    letter-spacing: 1px;
    font-weight: 400;
    animation: fadeUp 0.6s 0.5s cubic-bezier(0.22,1,0.36,1) both;
  }

  .tagline span {
    background: var(--grad);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
  }
</style>
</head>
